<!DOCTYPE html>
<html>
<head>
    <title>Hostel Complaint Management</title>

    <style>

        body{
            font-family: Arial;
            margin: 0;
            text-align: center;

            background-image: url("https://images.pexels.com/photos/207684/pexels-photo-207684.jpeg");

            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay{
            background-color: rgba(0,0,0,0.7);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header{
            background-color: darkblue;
            color: white;
            padding: 20px;
        }

        .box{
            width: 80%;
            margin: auto;
            margin-top: 30px;
            background-color: white;
            padding: 25px;
            border-radius: 15px;
        }

        .hostelimg img{
            width: 90%;
            height: 320px;
            border-radius: 15px;
            margin-top: 20px;
        }

        h2{
            color: darkblue;
        }

        p{
            font-size: 18px;
        }

        button{
            padding: 14px 24px;
            margin: 15px;
            border: none;
            border-radius: 8px;
            background-color: darkblue;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background-color: green;
            transform: scale(1.08);
        }

    </style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <h1>Hostel Complaint Management System</h1>
    </div>

    <div class="box">

        <div class="hostelimg">

            <img src="https://images.pexels.com/photos/271624/pexels-photo-271624.jpeg">

        </div>

        <h2>Welcome to ABC Hostel</h2>

        <p>Easy platform for hostel students to register complaints.</p>

        <h2>Vacancies</h2>

        <p>15 Rooms Available</p>

        <h2>Hostel Regulations</h2>

        <p>• Maintain discipline</p>
        <p>• Keep hostel clean</p>
        <p>• Follow hostel timing</p>

        <h2>Contact Information</h2>

        <p>Phone : 9876543210</p>
        <p>WhatsApp : 9876543210</p>

        <a href="student.html">
            <button>Register Complaint</button>
        </a>

        <a href="view.html">
            <button>View Previous Complaints</button>
        </a>

    </div>

</div>

</body>
</html>
