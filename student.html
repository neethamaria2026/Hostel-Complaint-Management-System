<!DOCTYPE html>
<html>
<head>
    <title>Register Complaint</title>

    <style>

        body{
            font-family: Arial;
            margin: 0;
            text-align: center;

            background-image: url("https://images.pexels.com/photos/1457842/pexels-photo-1457842.jpeg");

            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay{
            background-color: rgba(0,0,0,0.7);
            min-height: 100vh;
            padding-top: 40px;
        }

        .box{
            width: 450px;
            background-color: white;
            margin: auto;
            padding: 25px;
            border-radius: 15px;
        }

        h2{
            color: darkred;
        }

        input{
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 6px;
            border: 1px solid gray;
        }

        select{
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 6px;
            border: 1px solid gray;
        }

        textarea{
            width: 90%;
            height: 120px;
            padding: 12px;
            margin: 10px;
            border-radius: 6px;
            border: 1px solid gray;
        }

        button{
            padding: 14px 22px;
            border: none;
            background-color: darkred;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background-color: orange;
            transform: scale(1.08);
        }

    </style>
</head>

<body>

<div class="overlay">

    <div class="box">

        <h2>Student Complaint Form</h2>

        <input type="text" id="name" placeholder="Enter Student Name">

        <input type="text" id="room" placeholder="Enter Room Number">

        <input type="text" id="admission" placeholder="Enter Admission Number">

        <input type="text" id="floor" placeholder="Enter Floor">

        <input type="date" id="date">

        <select id="type">

            <option>Select Complaint Type</option>

            <option>Water Problem</option>

            <option>Electricity Problem</option>

            <option>Food Complaint</option>

            <option>Cleaning Issue</option>

            <option>Internet Issue</option>

        </select>

        <textarea id="complaint" placeholder="Enter Your Complaint"></textarea>

        <br>

        <button onclick="saveComplaint()">
            Submit Complaint
        </button>

    </div>

</div>

<script>

function saveComplaint(){

    let name = document.getElementById("name").value;

    let room = document.getElementById("room").value;

    let admission = document.getElementById("admission").value;

    let floor = document.getElementById("floor").value;

    let date = document.getElementById("date").value;

    let type = document.getElementById("type").value;

    let complaint = document.getElementById("complaint").value;

    let data = {

        name : name,

        room : room,

        admission : admission,

        floor : floor,

        date : date,

        type : type,

        complaint : complaint

    };

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    complaints.push(data);

    localStorage.setItem("complaints", JSON.stringify(complaints));

    alert("Complaint Submitted Successfully");

    window.location.href = "index.html";

}

</script>

</body>
</html>
